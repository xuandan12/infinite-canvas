server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location ~ ^/api/ark/api/(?:plan/)?v3/contents/generations/tasks$ {
        limit_except POST {
            deny all;
        }

        client_max_body_size 64m;
        rewrite ^/api/ark(/api/(?:plan/)?v3/contents/generations/tasks)$ $1 break;
        proxy_pass https://ark.cn-beijing.volces.com;
        proxy_ssl_server_name on;
        proxy_ssl_name ark.cn-beijing.volces.com;
        proxy_set_header Host ark.cn-beijing.volces.com;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Cookie "";
        proxy_set_header Origin "";
        proxy_set_header Referer "";
        proxy_hide_header Set-Cookie;
        proxy_hide_header Cache-Control;
        proxy_connect_timeout 10s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
        add_header Cache-Control "no-store" always;
        add_header X-Sun-Canvas-Ark-Proxy "1" always;
    }

    location ~ ^/api/ark/api/(?:plan/)?v3/contents/generations/tasks/[A-Za-z0-9_-]+$ {
        limit_except GET {
            deny all;
        }

        rewrite ^/api/ark(/api/(?:plan/)?v3/contents/generations/tasks/[A-Za-z0-9_-]+)$ $1 break;
        proxy_pass https://ark.cn-beijing.volces.com;
        proxy_ssl_server_name on;
        proxy_ssl_name ark.cn-beijing.volces.com;
        proxy_set_header Host ark.cn-beijing.volces.com;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Cookie "";
        proxy_set_header Origin "";
        proxy_set_header Referer "";
        proxy_hide_header Set-Cookie;
        proxy_hide_header Cache-Control;
        proxy_connect_timeout 10s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
        add_header Cache-Control "no-store" always;
        add_header X-Sun-Canvas-Ark-Proxy "1" always;
    }

    location /api/ark/ {
        return 404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
