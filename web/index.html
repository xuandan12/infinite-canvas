<!doctype html>
<html lang="zh-CN" class="font-sans">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="Sun canvas 是一款将 AI 生成、参考素材与创作脉络连接在一起的无限画布工作台。" />
        <meta name="application-name" content="Sun canvas" />
        <meta name="theme-color" content="#f7f4ed" media="(prefers-color-scheme: light)" />
        <meta name="theme-color" content="#0f0e0c" media="(prefers-color-scheme: dark)" />
        <link rel="icon" href="%BASE_URL%logo.png" type="image/png" />
        <title>Sun canvas — 无限创作画布</title>
        <script>
            try {
                var s = JSON.parse(localStorage.getItem("infinite-canvas:theme_store") || "{}");
                var t = s.state && s.state.theme === "light" ? "light" : "dark";
                document.documentElement.classList.toggle("dark", t === "dark");
                document.documentElement.style.colorScheme = t;
            } catch (e) {}
        </script>
    </head>
    <body class="bg-background text-foreground antialiased">
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
